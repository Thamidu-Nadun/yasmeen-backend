version: "3.9"

services:
  frontend:
    image: nadundev/yasmeen-frontend
    container_name: yasmeen_frontend
    restart: unless-stopped
    ports:
      - "5000:80"
  backend:
    image: nadundev/yasmeen-backend
    container_name: yasmeen_backend
    restart: unless-stopped
    ports:
      - "5001:5000"
